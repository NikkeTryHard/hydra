data_dir: /data
output_dir: /output
num_epochs: 1
batch_size: 256
microbatch_size: 64
validation_microbatch_size: 32
train_fraction: 0.9
augment: true
seed: 0
device: cuda:0
buffer_games: 16
buffer_samples: 128
archive_queue_bound: 8
validation_every_n_epochs: 1
max_skip_logs_per_source: 4
log_every_n_steps: 1
validate_every_n_steps: 10
checkpoint_every_n_steps: 1
max_train_steps: 1
tensorboard: false
preflight:
  warmup_steps: 1
  measure_steps: 1
  required_successes: 1
  target_warmup_seconds: 0.05
  target_measure_seconds: 0.10
  local_refinement_enabled: false
  finalist_extra_successes: 1
  finalist_extra_measure_steps: 1
rl:
  games_per_batch: 1
  temperature: 1.0
  phase: drda_ach_self_play
